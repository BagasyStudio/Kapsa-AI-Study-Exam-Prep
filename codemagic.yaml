workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Reppo App Store API

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - kapsa_env

    scripts:
      - name: Set up code signing
        script: |
          # Generate a fresh RSA private key
          openssl genrsa -out /tmp/cert_key.pem 2048
          export CERTIFICATE_PRIVATE_KEY=$(cat /tmp/cert_key.pem)

          keychain initialize

          # Revoke existing distribution certificates to avoid mismatch
          for type in IOS_DISTRIBUTION DISTRIBUTION; do
            app-store-connect certificates list --type "$type" --json 2>/dev/null | \
              python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              certs = data if isinstance(data, list) else data.get('data', data.get('certificates', []))
              for c in certs:
                  cid = c.get('id', '') if isinstance(c, dict) else ''
                  if cid: print(cid)
          except: pass
          " 2>/dev/null | while read -r cert_id; do
              echo "Deleting $type cert: $cert_id"
              app-store-connect certificates delete "$cert_id" --ignore-not-found 2>/dev/null || true
            done || true
          done

          # Create fresh certificate + provisioning profile
          app-store-connect fetch-signing-files "com.kapsa.kapsaApp" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@file:/tmp/cert_key.pem

          keychain add-certificates
          xcode-project use-profiles

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Flutter analyze
        script: |
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Flutter build IPA
        script: |
          PUBSPEC_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | sed 's/+.*//')
          flutter build ipa --release \
            --build-name=$PUBSPEC_VERSION \
            --build-number=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID") + 1)) \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=REVENUECAT_API_KEY="$REVENUECAT_API_KEY" \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - bautistastudio7@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
