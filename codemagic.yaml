workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Reppo App Store API

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kapsa.kapsaApp
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - kapsa_env

    scripts:
      - name: Set up code signing
        script: |
          # Generate a fresh RSA private key for this build
          openssl genrsa -out /tmp/cert_key.pem 2048
          export CERTIFICATE_PRIVATE_KEY=$(cat /tmp/cert_key.pem)

          # Initialize keychain
          keychain initialize

          # Revoke ALL existing distribution certificates to avoid mismatch
          echo "Cleaning up existing distribution certificates..."

          # Delete IOS_DISTRIBUTION certificates (legacy type)
          app-store-connect certificates list --type IOS_DISTRIBUTION --json 2>/dev/null | \
            python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              certs = data if isinstance(data, list) else data.get('data', data.get('certificates', []))
              for c in certs:
                  cid = c.get('id', '') if isinstance(c, dict) else ''
                  if cid: print(cid)
          except: pass
          " 2>/dev/null | while read -r cert_id; do
            echo "Deleting IOS_DISTRIBUTION cert: $cert_id"
            app-store-connect certificates delete "$cert_id" --ignore-not-found 2>/dev/null || true
          done || true

          # Delete DISTRIBUTION certificates (modern Apple Distribution type)
          app-store-connect certificates list --type DISTRIBUTION --json 2>/dev/null | \
            python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              certs = data if isinstance(data, list) else data.get('data', data.get('certificates', []))
              for c in certs:
                  cid = c.get('id', '') if isinstance(c, dict) else ''
                  if cid: print(cid)
          except: pass
          " 2>/dev/null | while read -r cert_id; do
            echo "Deleting DISTRIBUTION cert: $cert_id"
            app-store-connect certificates delete "$cert_id" --ignore-not-found 2>/dev/null || true
          done || true

          echo "Certificate cleanup done. Creating fresh certificate..."

          # Fetch/create signing files with the fresh key
          app-store-connect fetch-signing-files "com.kapsa.kapsaApp" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key=@file:/tmp/cert_key.pem

          # Add certificates to keychain and configure Xcode project
          keychain add-certificates
          xcode-project use-profiles

      - name: Get Flutter packages
        script: |
          flutter packages pub get

      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Flutter analyze
        script: |
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Flutter build IPA
        script: |
          flutter build ipa --release \
            --build-name=1.1.0 \
            --build-number=$(($(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID") + 1)) \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=REVENUECAT_API_KEY="$REVENUECAT_API_KEY" \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - bautistastudio7@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
